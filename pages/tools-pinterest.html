<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pinterest Downloader - FoxxyPortofolio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .tools-container { max-width: 800px; margin: 120px auto 40px; padding: 0 20px; }
        .tools-container h1 { font-size: 2rem; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 5px; }
        .tools-container .subtitle { color: var(--text-secondary); margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .input-group input { flex: 1; min-width: 200px; padding: 14px 18px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; }
        .input-group button { padding: 14px 30px; background: var(--gradient); border: none; border-radius: 12px; color: var(--dark-bg); font-weight: 700; cursor: pointer; transition: all 0.3s ease; }
        .input-group button:hover { transform: scale(1.05); box-shadow: var(--shadow-hover); }
        .result-box { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; margin-top: 20px; display: none; }
        .result-box.show { display: block; }
        .result-box video { width: 100%; border-radius: 12px; }
        .result-box img { width: 100%; border-radius: 12px; }
        .result-box .info { margin-top: 15px; color: var(--text-secondary); }
        .result-box .info strong { color: var(--text-primary); }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; margin-top: 30px; padding: 10px 25px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; color: var(--text-primary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { border-color: var(--neon-blue); transform: translateX(-5px); }
        .download-link { display: inline-block; background: var(--neon-blue); color: var(--dark-bg); padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: 600; margin-top: 10px; }
        .alert { padding: 15px; border-radius: 12px; background: rgba(0, 242, 254, 0.1); border: 1px solid var(--neon-blue); color: var(--neon-blue); text-align: center; }
        .flex-wrap { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; justify-content: center; }
    </style>
</head>
<body>

    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon" style="display: none;"></i>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="https://c.top4top.io/p_3819ed0vz1.jpg" alt="Logo" class="logo-img">
                <span>Foxxy</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">Beranda</a>
                <a href="store.html" class="nav-link">Store</a>
                <a href="bot-sewa.html" class="nav-link">Sewa Bot</a>
                <a href="tools.html" class="nav-link active">Tools</a>
                <a href="komunitas.html" class="nav-link">Komunitas</a>
                <a href="../admin/developer.html" class="nav-link">Developer</a>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="tools-container">
        <h1><i class="fab fa-pinterest"></i> Pinterest Downloader</h1>
        <p class="subtitle">Download video atau foto dari Pinterest dengan mudah</p>

        <div class="input-group">
            <input type="text" id="pinterestUrl" placeholder="Masukkan URL Pinterest... (contoh: https://pin.it/xxxx)">
            <button id="downloadBtn"><i class="fab fa-pinterest"></i> Download</button>
        </div>

        <div class="result-box" id="resultBox">
            <div id="resultContent"></div>
        </div>

        <a href="tools.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Tools</a>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 <span class="watermark">Foxxy</span>. All right reserved.</p>
                <p>Developed By <span class="watermark">FoxxyOffc / FoxxyPrst</span></p>
            </div>
        </div>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initNavToggle();
            
            const btn = document.getElementById('downloadBtn');
            const urlInput = document.getElementById('pinterestUrl');
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');
            
            btn.addEventListener('click', async () => {
                const url = urlInput.value.trim();
                if (!url) {
                    alert('Masukkan URL Pinterest terlebih dahulu!');
                    return;
                }
                if (!url.match(/pinterest\.com|pin\.it/i)) {
                    alert('❌ URL bukan dari Pinterest!');
                    return;
                }
                
                resultBox.classList.add('show');
                resultContent.innerHTML = '<div class="alert"><i class="fas fa-spinner fa-spin"></i> Memproses...</div>';
                
                try {
                    const apiUrl = `https://api.botcahx.eu.org/api/download/pinterest?apikey=alipaiapikeybaru&url=${encodeURIComponent(url)}`;
                    const response = await fetch(apiUrl);
                    const data = await response.json();
                    
                    if (data && data.result && data.result.data) {
                        const media = data.result.data;
                        let html = '';
                        
                        if (media.video) {
                            html = `
                                <video src="${media.video}" controls></video>
                                <div class="info">
                                    <p><strong><i class="fab fa-pinterest"></i> Judul:</strong> ${media.title || 'Pinterest Video'}</p>
                                    <div class="flex-wrap">
                                        <a href="${media.video}" download class="download-link"><i class="fas fa-download"></i> Download Video</a>
                                    </div>
                                </div>
                            `;
                        } else if (media.image) {
                            html = `
                                <img src="${media.image}" alt="Pinterest Image">
                                <div class="info">
                                    <p><strong><i class="fab fa-pinterest"></i> Judul:</strong> ${media.title || 'Pinterest Image'}</p>
                                    <div class="flex-wrap">
                                        <a href="${media.image}" download class="download-link"><i class="fas fa-download"></i> Download Gambar</a>
                                    </div>
                                </div>
                            `;
                        } else {
                            html = `<div class="alert">Media tidak ditemukan.</div>`;
                        }
                        resultContent.innerHTML = html;
                    } else {
                        resultContent.innerHTML = `
                            <div class="alert">
                                <i class="fas fa-exclamation-triangle"></i> Gagal memproses. Coba gunakan tools di bawah ini:
                            </div>
                            <div class="flex-wrap" style="margin-top: 15px;">
                                <a href="${getConfig().downloadLinks?.pinterest || 'https://pindown.io/id1'}" target="_blank" class="download-link" style="background: var(--neon-blue); color: var(--dark-bg); text-decoration: none;">Buka PinDown.io</a>
                                <a href="${getConfig().downloadLinks?.pinterest || 'https://klickpin.com/id/'}" target="_blank" class="download-link" style="background: var(--glass-bg); color: var(--neon-blue); text-decoration: none;">Buka KlickPin</a>
                            </div>
                        `;
                    }
                } catch (error) {
                    resultContent.innerHTML = `
                        <div class="alert">
                            <i class="fas fa-exclamation-triangle"></i> Error. Coba gunakan tools di bawah ini:
                        </div>
                        <div class="flex-wrap" style="margin-top: 15px;">
                            <a href="${getConfig().downloadLinks?.pinterest || 'https://pindown.io/id1'}" target="_blank" class="download-link" style="background: var(--neon-blue); color: var(--dark-bg); text-decoration: none;">Buka PinDown.io</a>
                            <a href="${getConfig().downloadLinks?.pinterest || 'https://klickpin.com/id/'}" target="_blank" class="download-link" style="background: var(--glass-bg); color: var(--neon-blue); text-decoration: none;">Buka KlickPin</a>
                        </div>
                    `;
                }
            });
        });
    </script>
</body>
</html>
