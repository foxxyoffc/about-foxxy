<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mata Uang - FoxxyPortofolio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .tools-container {
            max-width: 800px;
            margin: 120px auto 40px;
            padding: 0 20px;
        }
        .tools-container h1 {
            font-size: 2.2rem;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
        }
        .tools-container .subtitle {
            color: var(--text-secondary);
            margin-bottom: 25px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .input-group input,
        .input-group select {
            padding: 14px 18px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            flex: 1;
            min-width: 120px;
        }
        .input-group .arrow {
            color: var(--text-secondary);
            align-self: center;
            font-size: 1.2rem;
            padding: 0 5px;
        }
        .input-group button {
            padding: 14px 30px;
            background: var(--gradient);
            border: none;
            border-radius: 12px;
            color: var(--dark-bg);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }
        .input-group button:hover {
            transform: scale(1.05);
            box-shadow: var(--shadow-hover);
        }
        .result-box {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        .result-box.show {
            display: block;
        }
        .result-box .result-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--neon-blue);
            text-align: center;
            padding: 15px;
            word-break: break-word;
        }
        .result-box .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--glass-border);
        }
        .result-box .info-row:last-child {
            border-bottom: none;
        }
        .result-box .info-row .label {
            color: var(--text-secondary);
        }
        .result-box .info-row .value {
            font-weight: 600;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            padding: 10px 25px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            color: var(--text-primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn-back:hover {
            border-color: var(--neon-blue);
            transform: translateX(-5px);
        }
        .alert {
            padding: 15px;
            border-radius: 12px;
            background: rgba(0, 242, 254, 0.1);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            text-align: center;
        }
        .alert i {
            margin-right: 8px;
        }
        .popular-rates {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }
        .popular-rates .rate-item {
            background: var(--glass-bg);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .popular-rates .rate-item:hover {
            border-color: var(--neon-blue);
            transform: translateY(-2px);
        }
        .popular-rates .rate-item .currency {
            font-weight: 700;
            color: var(--neon-blue);
            font-size: 1rem;
        }
        .popular-rates .rate-item .value {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-blue);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .tools-container h1 { font-size: 1.7rem; }
            .input-group input,
            .input-group select {
                min-width: 100%;
                flex: 1 1 100%;
            }
            .input-group .arrow {
                display: none;
            }
            .input-group button {
                width: 100%;
            }
            .result-box .result-value {
                font-size: 1.5rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon" style="display: none;"></i>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="https://c.top4top.io/p_3819ed0vz1.jpg" alt="Logo" class="logo-img">
                <span>Foxxy</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">Beranda</a>
                <a href="store.html" class="nav-link">Store</a>
                <a href="bot-sewa.html" class="nav-link">Sewa Bot</a>
                <a href="tools.html" class="nav-link active">Tools</a>
                <a href="komunitas.html" class="nav-link">Komunitas</a>
                <a href="../admin/developer.html" class="nav-link">Developer</a>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="tools-container">
        <h1><i class="fas fa-money-bill-wave"></i> Konversi Mata Uang</h1>
        <p class="subtitle">Konversi mata uang asing ke Rupiah (IDR) dengan kurs real-time</p>

        <div class="input-group">
            <input type="number" id="amountInput" placeholder="Jumlah" value="1" min="0" step="any">
            <select id="fromCurrency">
                <option value="USD">🇺🇸 USD - US Dollar</option>
                <option value="IDR" selected>🇮🇩 IDR - Indonesian Rupiah</option>
                <option value="EUR">🇪🇺 EUR - Euro</option>
                <option value="GBP">🇬🇧 GBP - British Pound</option>
                <option value="JPY">🇯🇵 JPY - Japanese Yen</option>
                <option value="SGD">🇸🇬 SGD - Singapore Dollar</option>
                <option value="MYR">🇲🇾 MYR - Malaysian Ringgit</option>
                <option value="AUD">🇦🇺 AUD - Australian Dollar</option>
                <option value="CNY">🇨🇳 CNY - Chinese Yuan</option>
                <option value="SAR">🇸🇦 SAR - Saudi Riyal</option>
                <option value="KRW">🇰🇷 KRW - Korean Won</option>
                <option value="THB">🇹🇭 THB - Thai Baht</option>
                <option value="VND">🇻🇳 VND - Vietnamese Dong</option>
                <option value="PHP">🇵🇭 PHP - Philippine Peso</option>
            </select>
            <span class="arrow"><i class="fas fa-arrow-right"></i></span>
            <select id="toCurrency">
                <option value="USD">🇺🇸 USD - US Dollar</option>
                <option value="IDR" selected>🇮🇩 IDR - Indonesian Rupiah</option>
                <option value="EUR">🇪🇺 EUR - Euro</option>
                <option value="GBP">🇬🇧 GBP - British Pound</option>
                <option value="JPY">🇯🇵 JPY - Japanese Yen</option>
                <option value="SGD">🇸🇬 SGD - Singapore Dollar</option>
                <option value="MYR">🇲🇾 MYR - Malaysian Ringgit</option>
                <option value="AUD">🇦🇺 AUD - Australian Dollar</option>
                <option value="CNY">🇨🇳 CNY - Chinese Yuan</option>
                <option value="SAR">🇸🇦 SAR - Saudi Riyal</option>
                <option value="KRW">🇰🇷 KRW - Korean Won</option>
                <option value="THB">🇹🇭 THB - Thai Baht</option>
                <option value="VND">🇻🇳 VND - Vietnamese Dong</option>
                <option value="PHP">🇵🇭 PHP - Philippine Peso</option>
            </select>
            <button id="convertBtn"><i class="fas fa-exchange-alt"></i> Konversi</button>
        </div>

        <div class="result-box" id="resultBox">
            <div id="resultContent"></div>
        </div>

        <a href="tools.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Tools</a>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 <span class="watermark">Foxxy</span>. All right reserved.</p>
                <p>Developed By <span class="watermark">FoxxyOffc / FoxxyPrst</span></p>
            </div>
        </div>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize theme & navbar
            if (typeof initTheme === 'function') initTheme();
            if (typeof initNavToggle === 'function') initNavToggle();

            const btn = document.getElementById('convertBtn');
            const amountInput = document.getElementById('amountInput');
            const fromSelect = document.getElementById('fromCurrency');
            const toSelect = document.getElementById('toCurrency');
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');

            // ========== LOAD CURRENCIES FROM FRANKFURTER API ==========
            async function loadCurrencies() {
                try {
                    const response = await fetch('https://api.frankfurter.dev/v1/currencies');
                    const data = await response.json();
                    
                    // Simpan nilai yang dipilih sebelumnya
                    const fromVal = fromSelect.value;
                    const toVal = toSelect.value;

                    // Kosongkan select
                    fromSelect.innerHTML = '';
                    toSelect.innerHTML = '';

                    // Urutkan berdasarkan kode mata uang
                    const sortedKeys = Object.keys(data).sort();

                    sortedKeys.forEach(code => {
                        const name = data[code];
                        const option1 = document.createElement('option');
                        option1.value = code;
                        option1.textContent = `${code} - ${name}`;
                        fromSelect.appendChild(option1);

                        const option2 = document.createElement('option');
                        option2.value = code;
                        option2.textContent = `${code} - ${name}`;
                        toSelect.appendChild(option2);
                    });

                    // Kembalikan pilihan sebelumnya jika masih ada
                    if (document.querySelector(`#fromCurrency option[value="${fromVal}"]`)) {
                        fromSelect.value = fromVal;
                    } else {
                        fromSelect.value = 'USD';
                    }
                    
                    if (document.querySelector(`#toCurrency option[value="${toVal}"]`)) {
                        toSelect.value = toVal;
                    } else {
                        toSelect.value = 'IDR';
                    }

                    // Trigger konversi otomatis pertama kali
                    performConversion();

                } catch (error) {
                    console.log('Gagal load currencies dari Frankfurter, pake default');
                    // Trigger konversi dengan data default
                    performConversion();
                }
            }

            // ========== PERFORM CONVERSION ==========
            async function performConversion() {
                const amount = parseFloat(amountInput.value);
                if (!amount || amount <= 0) {
                    resultBox.classList.remove('show');
                    return;
                }

                const from = fromSelect.value;
                const to = toSelect.value;

                resultBox.classList.add('show');
                resultContent.innerHTML = `
                    <div class="alert">
                        <i class="fas fa-spinner fa-spin"></i> Mengkonversi ${amount} ${from} ke ${to}...
                    </div>
                `;

                try {
                    const url = `https://api.frankfurter.dev/v1/latest?base=${from}&symbols=${to}`;
                    const response = await fetch(url);
                    const data = await response.json();

                    if (data.rates && data.rates[to]) {
                        const rate = data.rates[to];
                        const result = amount * rate;
                        const date = data.date || new Date().toISOString().split('T')[0];

                        resultContent.innerHTML = `
                            <div class="result-value">
                                ${amount.toLocaleString('id-ID')} ${from} = 
                                <span style="color: #00ff88;">${result.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span> ${to}
                            </div>
                            <div class="info-row">
                                <span class="label">Kurs</span>
                                <span class="value">1 ${from} = ${rate.toFixed(4)} ${to}</span>
                            </div>
                            <div class="info-row">
                                <span class="label">Tanggal Update</span>
                                <span class="value">${date}</span>
                            </div>
                            <div class="info-row">
                                <span class="label">Sumber Data</span>
                                <span class="value">European Central Bank (ECB)</span>
                            </div>
                            <div style="margin-top: 15px; text-align: center; color: var(--text-secondary); font-size: 0.8rem;">
                                <i class="fas fa-info-circle"></i> Data real-time dari Frankfurter API
                            </div>
                        `;
                    } else {
                        resultContent.innerHTML = `
                            <div class="alert">
                                <i class="fas fa-exclamation-triangle"></i> Kurs untuk ${from} ke ${to} tidak tersedia.
                            </div>
                        `;
                    }

                } catch (error) {
                    console.error('Frankfurter API Error:', error);
                    resultContent.innerHTML = `
                        <div class="alert">
                            <i class="fas fa-exclamation-triangle"></i> Gagal mengambil data kurs. Coba lagi nanti.
                        </div>
                    `;
                }
            }

            // ========== EVENT LISTENERS ==========
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                performConversion();
            });

            // Konversi otomatis saat ganti jumlah atau mata uang
            amountInput.addEventListener('input', performConversion);
            fromSelect.addEventListener('change', performConversion);
            toSelect.addEventListener('change', performConversion);

            // Enter key support
            amountInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performConversion();
                }
            });

            // ========== LOAD CURRENCIES ON START ==========
            loadCurrencies();

        });
    </script>
</body>
</html>
