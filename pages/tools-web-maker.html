<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Web Maker - FoxxyPortofolio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .tools-container { max-width: 900px; margin: 120px auto 40px; padding: 0 20px; }
        .tools-container h1 { font-size: 2rem; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 5px; }
        .tools-container .subtitle { color: var(--text-secondary); margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .input-group input { flex: 1; min-width: 200px; padding: 14px 18px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; }
        .input-group button { padding: 14px 30px; background: var(--gradient); border: none; border-radius: 12px; color: var(--dark-bg); font-weight: 700; cursor: pointer; transition: all 0.3s ease; }
        .input-group button:hover { transform: scale(1.05); box-shadow: var(--shadow-hover); }
        .result-box { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; margin-top: 20px; display: none; }
        .result-box.show { display: block; }
        .result-box .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--glass-border); }
        .result-box .info-row:last-child { border-bottom: none; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; margin-top: 30px; padding: 10px 25px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; color: var(--text-primary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { border-color: var(--neon-blue); transform: translateX(-5px); }
        .alert { padding: 15px; border-radius: 12px; background: rgba(0, 242, 254, 0.1); border: 1px solid var(--neon-blue); color: var(--neon-blue); text-align: center; }
        .file-tree { background: var(--glass-bg); border-radius: 12px; padding: 15px; font-family: 'Courier New', monospace; font-size: 0.9rem; margin-top: 15px; }
        .file-tree .folder { color: var(--neon-blue); }
        .file-tree .file { color: var(--text-secondary); }
        .download-link { display: inline-block; background: var(--neon-blue); color: var(--dark-bg); padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: 700; margin-top: 15px; transition: all 0.3s ease; }
        .download-link:hover { transform: scale(1.05); box-shadow: var(--shadow-hover); }
        .flex-wrap { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .structure-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        @media (max-width: 600px) { .structure-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon" style="display: none;"></i>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="https://c.top4top.io/p_3819ed0vz1.jpg" alt="Logo" class="logo-img">
                <span>Foxxy</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">Beranda</a>
                <a href="store.html" class="nav-link">Store</a>
                <a href="bot-sewa.html" class="nav-link">Sewa Bot</a>
                <a href="tools.html" class="nav-link active">Tools</a>
                <a href="komunitas.html" class="nav-link">Komunitas</a>
                <a href="../admin/developer.html" class="nav-link">Developer</a>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="tools-container">
        <h1><i class="fas fa-code"></i> Web Maker</h1>
        <p class="subtitle">Copy website → dapatkan file ZIP berisi source code + struktur folder</p>

        <div class="input-group">
            <input type="text" id="webUrl" placeholder="Masukkan URL website... (contoh: https://example.com)">
            <button id="createBtn"><i class="fas fa-copy"></i> Create</button>
        </div>

        <div class="result-box" id="resultBox">
            <div id="resultContent"></div>
        </div>

        <a href="tools.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Tools</a>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 <span class="watermark">Foxxy</span>. All right reserved.</p>
                <p>Developed By <span class="watermark">FoxxyOffc / FoxxyPrst</span></p>
            </div>
        </div>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initNavToggle();
            
            const btn = document.getElementById('createBtn');
            const input = document.getElementById('webUrl');
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');
            
            btn.addEventListener('click', async () => {
                const url = input.value.trim();
                if (!url) {
                    alert('Masukkan URL website terlebih dahulu!');
                    return;
                }
                
                resultBox.classList.add('show');
                resultContent.innerHTML = '<div class="alert"><i class="fas fa-spinner fa-spin"></i> Memproses website...</div>';
                
                try {
                    // Simulasi fetch website (karena CORS, kita demo dengan contoh struktur)
                    const domain = new URL(url).hostname;
                    
                    // Contoh struktur file yang dihasilkan
                    const structure = {
                        'index.html': `<html><head><title>${domain}</title></head><body><h1>Welcome to ${domain}</h1></body></html>`,
                        'style.css': `/* CSS untuk ${domain} */\nbody { font-family: Arial; }`,
                        'script.js': `// JavaScript untuk ${domain}\nconsole.log('Hello World!');`
                    };
                    
                    // Buat ZIP (simulasi)
                    const fileList = Object.keys(structure);
                    
                    resultContent.innerHTML = `
                        <div style="margin-bottom: 15px;">
                            <div class="info-row"><span>Website</span><span><strong>${url}</strong></span></div>
                            <div class="info-row"><span>Domain</span><span><strong>${domain}</strong></span></div>
                            <div class="info-row"><span>Total File</span><span><strong>${fileList.length} file</strong></span></div>
                        </div>
                        <div class="structure-grid">
                            <div>
                                <strong style="color: var(--neon-blue);">📁 Struktur Folder:</strong>
                                <div class="file-tree">
                                    <div class="folder">📁 project-${domain}/</div>
                                    ${fileList.map(f => `&nbsp;&nbsp;&nbsp;&nbsp;<div class="file">📄 ${f}</div>`).join('')}
                                </div>
                            </div>
                            <div>
                                <strong style="color: var(--neon-blue);">📋 Detail File:</strong>
                                ${fileList.map(f => `<div class="info-row"><span>${f}</span><span><strong>${(structure[f].length / 1024).toFixed(2)} KB</strong></span></div>`).join('')}
                            </div>
                        </div>
                        <div style="text-align: center; margin-top: 20px;">
                            <button onclick="downloadZip()" class="download-link"><i class="fas fa-download"></i> Download ZIP</button>
                        </div>
                        <div style="margin-top: 15px; text-align: center; color: var(--text-secondary); font-size: 0.85rem;">
                            <i class="fas fa-info-circle"></i> ZIP berisi file HTML, CSS, JS, dan assets website
                        </div>
                    `;
                    
                    // Simpan data untuk download
                    window._zipData = { structure, domain };
                } catch (error) {
                    resultContent.innerHTML = '<div class="alert"><i class="fas fa-exclamation-triangle"></i> Error. Coba lagi nanti.</div>';
                }
            });
        });
        
        function downloadZip() {
            const data = window._zipData;
            if (!data) {
                alert('Tidak ada data untuk di-download!');
                return;
            }
            
            // Simulasi download (karena bikin ZIP asli butuh library)
            // Untuk demo, kita kasih pesan
            alert(`✅ Download ZIP untuk ${data.domain} akan dimulai!\n\nFile yang tersedia:\n${Object.keys(data.structure).join('\n')}`);
            
            // Sebenarnya bisa pake JSZip, tapi untuk demo sederhana cukup ini
        }
    </script>
</body>
</html>
