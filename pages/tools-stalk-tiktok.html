<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Stalk TikTok - FoxxyPortofolio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .tools-container { max-width: 800px; margin: 120px auto 40px; padding: 0 20px; }
        .tools-container h1 { font-size: 2rem; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 5px; }
        .tools-container .subtitle { color: var(--text-secondary); margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .input-group input { flex: 1; min-width: 200px; padding: 14px 18px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; }
        .input-group button { padding: 14px 30px; background: var(--gradient); border: none; border-radius: 12px; color: var(--dark-bg); font-weight: 700; cursor: pointer; transition: all 0.3s ease; }
        .input-group button:hover { transform: scale(1.05); box-shadow: var(--shadow-hover); }
        .result-box { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; margin-top: 20px; display: none; }
        .result-box.show { display: block; }
        .result-box .profile { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .result-box .profile img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--neon-blue); }
        .result-box .profile .name { font-size: 1.3rem; font-weight: 700; }
        .result-box .profile .username { color: var(--text-secondary); }
        .result-box .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; margin: 20px 0; }
        .result-box .stats .stat { text-align: center; background: var(--glass-bg); padding: 10px; border-radius: 12px; }
        .result-box .stats .stat .number { font-size: 1.5rem; font-weight: 700; color: var(--neon-blue); }
        .result-box .stats .stat .label { color: var(--text-secondary); font-size: 0.8rem; }
        .result-box .bio { color: var(--text-secondary); margin-top: 10px; padding: 10px; background: var(--glass-bg); border-radius: 12px; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; margin-top: 30px; padding: 10px 25px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; color: var(--text-primary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { border-color: var(--neon-blue); transform: translateX(-5px); }
        .alert { padding: 15px; border-radius: 12px; background: rgba(0, 242, 254, 0.1); border: 1px solid var(--neon-blue); color: var(--neon-blue); text-align: center; }
    </style>
</head>
<body>

    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon" style="display: none;"></i>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="https://c.top4top.io/p_3819ed0vz1.jpg" alt="Logo" class="logo-img">
                <span>Foxxy</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">Beranda</a>
                <a href="store.html" class="nav-link">Store</a>
                <a href="bot-sewa.html" class="nav-link">Sewa Bot</a>
                <a href="tools.html" class="nav-link active">Tools</a>
                <a href="komunitas.html" class="nav-link">Komunitas</a>
                <a href="../admin/developer.html" class="nav-link">Developer</a>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="tools-container">
        <h1><i class="fab fa-tiktok"></i> Stalk TikTok</h1>
        <p class="subtitle">Cari informasi akun TikTok berdasarkan username</p>

        <div class="input-group">
            <input type="text" id="usernameInput" placeholder="Masukkan username TikTok... (contoh: @foxxyoffc)">
            <button id="stalkBtn"><i class="fas fa-search"></i> Stalk</button>
        </div>

        <div class="result-box" id="resultBox">
            <div id="resultContent"></div>
        </div>

        <a href="tools.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Tools</a>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 <span class="watermark">Foxxy</span>. All right reserved.</p>
                <p>Developed By <span class="watermark">FoxxyOffc / FoxxyPrst</span></p>
            </div>
        </div>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initNavToggle();
            
            const btn = document.getElementById('stalkBtn');
            const input = document.getElementById('usernameInput');
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');
            
            btn.addEventListener('click', async () => {
                let username = input.value.trim();
                if (!username) {
                    alert('Masukkan username TikTok terlebih dahulu!');
                    return;
                }
                username = username.replace('@', '').trim();
                
                resultBox.classList.add('show');
                resultContent.innerHTML = '<div class="alert"><i class="fas fa-spinner fa-spin"></i> Mencari data...</div>';
                
                try {
                    const response = await fetch(`https://api.botcahx.eu.org/api/stalk/tiktok?apikey=alipaiapikeybaru&username=${encodeURIComponent(username)}`);
                    const data = await response.json();
                    
                    if (data && data.result) {
                        const user = data.result;
                        resultContent.innerHTML = `
                            <div class="profile">
                                <img src="${user.avatar || 'https://via.placeholder.com/80x80?text=No+Avatar'}" alt="Avatar">
                                <div>
                                    <div class="name">${user.name || user.username}</div>
                                    <div class="username">@${user.username}</div>
                                </div>
                            </div>
                            <div class="stats">
                                <div class="stat"><div class="number">${user.followers || 0}</div><div class="label">Followers</div></div>
                                <div class="stat"><div class="number">${user.likes || 0}</div><div class="label">Likes</div></div>
                                <div class="stat"><div class="number">${user.following || 0}</div><div class="label">Following</div></div>
                                <div class="stat"><div class="number">${user.videos || 0}</div><div class="label">Videos</div></div>
                            </div>
                            ${user.bio ? `<div class="bio"><strong>Bio:</strong> ${user.bio}</div>` : ''}
                        `;
                    } else {
                        resultContent.innerHTML = '<div class="alert"><i class="fas fa-exclamation-triangle"></i> Akun tidak ditemukan atau username salah.</div>';
                    }
                } catch (error) {
                    resultContent.innerHTML = '<div class="alert"><i class="fas fa-exclamation-triangle"></i> Error. Coba lagi nanti.</div>';
                }
            });
        });
    </script>
</body>
</html>
