<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YouTube Downloader - FoxxyPortofolio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .tools-container { max-width: 800px; margin: 120px auto 40px; padding: 0 20px; }
        .tools-container h1 { font-size: 2rem; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 5px; }
        .tools-container .subtitle { color: var(--text-secondary); margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .input-group input { flex: 1; min-width: 200px; padding: 14px 18px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; }
        .input-group button { padding: 14px 30px; background: var(--gradient); border: none; border-radius: 12px; color: var(--dark-bg); font-weight: 700; cursor: pointer; transition: all 0.3s ease; }
        .input-group button:hover { transform: scale(1.05); box-shadow: var(--shadow-hover); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn-group button { flex: 1; padding: 12px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); cursor: pointer; transition: all 0.3s ease; font-weight: 600; }
        .btn-group button:hover { border-color: var(--neon-blue); background: var(--glass-bg); }
        .btn-group button.active { border-color: var(--neon-blue); background: rgba(0, 242, 254, 0.1); }
        .result-box { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; margin-top: 20px; display: none; }
        .result-box.show { display: block; }
        .result-box video { width: 100%; border-radius: 12px; }
        .result-box .info { margin-top: 15px; color: var(--text-secondary); }
        .result-box .info strong { color: var(--text-primary); }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; margin-top: 30px; padding: 10px 25px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; color: var(--text-primary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { border-color: var(--neon-blue); transform: translateX(-5px); }
        .download-link { display: inline-block; background: var(--neon-blue); color: var(--dark-bg); padding: 10px 20px; border-radius: 30px; text-decoration: none; font-weight: 600; margin-top: 10px; }
        .alert { padding: 15px; border-radius: 12px; background: rgba(0, 242, 254, 0.1); border: 1px solid var(--neon-blue); color: var(--neon-blue); text-align: center; }
        .flex-wrap { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon" style="display: none;"></i>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="https://c.top4top.io/p_3819ed0vz1.jpg" alt="Logo" class="logo-img">
                <span>Foxxy</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">Beranda</a>
                <a href="store.html" class="nav-link">Store</a>
                <a href="bot-sewa.html" class="nav-link">Sewa Bot</a>
                <a href="tools.html" class="nav-link active">Tools</a>
                <a href="komunitas.html" class="nav-link">Komunitas</a>
                <a href="../admin/developer.html" class="nav-link">Developer</a>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="tools-container">
        <h1><i class="fab fa-youtube"></i> YouTube Downloader</h1>
        <p class="subtitle">Download video MP4 atau audio MP3 dari YouTube</p>

        <div class="input-group">
            <input type="text" id="youtubeUrl" placeholder="Masukkan URL YouTube... (contoh: https://youtu.be/xxxxx)">
            <button id="downloadBtn"><i class="fab fa-youtube"></i> Download</button>
        </div>

        <div class="btn-group">
            <button id="videoBtn" class="active"><i class="fas fa-video"></i> Video (MP4)</button>
            <button id="audioBtn"><i class="fas fa-music"></i> Audio (MP3)</button>
        </div>

        <div class="result-box" id="resultBox">
            <div id="resultContent"></div>
        </div>

        <a href="tools.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Tools</a>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 <span class="watermark">Foxxy</span>. All right reserved.</p>
                <p>Developed By <span class="watermark">FoxxyOffc / FoxxyPrst</span></p>
            </div>
        </div>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initNavToggle();
            
            let mode = 'video';
            const videoBtn = document.getElementById('videoBtn');
            const audioBtn = document.getElementById('audioBtn');
            const btn = document.getElementById('downloadBtn');
            const urlInput = document.getElementById('youtubeUrl');
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');
            
            videoBtn.addEventListener('click', () => {
                mode = 'video';
                videoBtn.classList.add('active');
                audioBtn.classList.remove('active');
            });
            
            audioBtn.addEventListener('click', () => {
                mode = 'audio';
                audioBtn.classList.add('active');
                videoBtn.classList.remove('active');
            });
            
            btn.addEventListener('click', async () => {
                const url = urlInput.value.trim();
                if (!url) {
                    alert('Masukkan URL YouTube terlebih dahulu!');
                    return;
                }
                
                resultBox.classList.add('show');
                resultContent.innerHTML = '<div class="alert"><i class="fas fa-spinner fa-spin"></i> Memproses...</div>';
                
                try {
                    const endpoint = mode === 'video' ? 'ytmp4' : 'ytmp3';
                    const apiUrl = `https://api.ryzendesu.vip/api/downloader/${endpoint}?url=${encodeURIComponent(url)}`;
                    const response = await fetch(apiUrl);
                    const data = await response.json();
                    
                    if (data.status === 200 || data.url) {
                        const mediaUrl = data.url || data.download_url;
                        const title = data.title || 'YouTube Video';
                        const duration = data.duration || 'Unknown';
                        
                        if (mode === 'video') {
                            resultContent.innerHTML = `
                                <video src="${mediaUrl}" controls></video>
                                <div class="info">
                                    <p><strong><i class="fab fa-youtube"></i> Judul:</strong> ${title}</p>
                                    <p><strong><i class="fas fa-clock"></i> Durasi:</strong> ${duration}</p>
                                    <div class="flex-wrap">
                                        <a href="${mediaUrl}" download class="download-link"><i class="fas fa-download"></i> Download Video</a>
                                    </div>
                                </div>
                            `;
                        } else {
                            resultContent.innerHTML = `
                                <div style="text-align: center; padding: 20px;">
                                    <i class="fas fa-music" style="font-size: 3rem; color: var(--neon-blue);"></i>
                                </div>
                                <div class="info">
                                    <p><strong><i class="fab fa-youtube"></i> Judul:</strong> ${title}</p>
                                    <p><strong><i class="fas fa-clock"></i> Durasi:</strong> ${duration}</p>
                                    <p><strong><i class="fas fa-file-audio"></i> Format:</strong> MP3</p>
                                    <div class="flex-wrap">
                                        <a href="${mediaUrl}" download class="download-link"><i class="fas fa-download"></i> Download Audio (MP3)</a>
                                    </div>
                                </div>
                            `;
                        }
                    } else {
                        resultContent.innerHTML = `
                            <div class="alert">
                                <i class="fas fa-exclamation-triangle"></i> Gagal memproses. 
                                <a href="${getConfig().downloadLinks?.youtube || 'https://yt1s.com'}" target="_blank" style="color: var(--neon-blue);">Buka link resmi</a>
                            </div>
                        `;
                    }
                } catch (error) {
                    resultContent.innerHTML = `
                        <div class="alert">
                            <i class="fas fa-exclamation-triangle"></i> Error. 
                            <a href="${getConfig().downloadLinks?.youtube || 'https://yt1s.com'}" target="_blank" style="color: var(--neon-blue);">Buka link resmi</a>
                        </div>
                    `;
                }
            });
        });
    </script>
</body>
</html>
