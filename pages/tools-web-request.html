<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Web Request - FoxxyPortofolio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .tools-container { max-width: 900px; margin: 120px auto 40px; padding: 0 20px; }
        .tools-container h1 { font-size: 2rem; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 5px; }
        .tools-container .subtitle { color: var(--text-secondary); margin-bottom: 25px; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .input-group input { flex: 1; min-width: 200px; padding: 14px 18px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; }
        .input-group textarea { flex: 1; min-width: 200px; padding: 14px 18px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text-primary); font-size: 1rem; resize: vertical; min-height: 100px; }
        .input-group button { padding: 14px 30px; background: var(--gradient); border: none; border-radius: 12px; color: var(--dark-bg); font-weight: 700; cursor: pointer; transition: all 0.3s ease; }
        .input-group button:hover { transform: scale(1.05); box-shadow: var(--shadow-hover); }
        .result-box { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 20px; margin-top: 20px; display: none; }
        .result-box.show { display: block; }
        .result-box .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--glass-border); }
        .result-box .info-row:last-child { border-bottom: none; }
        .btn-back { display: inline-flex; align-items: center; gap: 8px; margin-top: 30px; padding: 10px 25px; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; color: var(--text-primary); text-decoration: none; transition: all 0.3s ease; }
        .btn-back:hover { border-color: var(--neon-blue); transform: translateX(-5px); }
        .alert { padding: 15px; border-radius: 12px; background: rgba(0, 242, 254, 0.1); border: 1px solid var(--neon-blue); color: var(--neon-blue); text-align: center; }
        .download-link { display: inline-block; background: var(--neon-blue); color: var(--dark-bg); padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: 700; margin-top: 15px; transition: all 0.3s ease; }
        .download-link:hover { transform: scale(1.05); box-shadow: var(--shadow-hover); }
        .flex-wrap { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
        .feature-tag { display: inline-block; background: rgba(0, 242, 254, 0.15); color: var(--neon-blue); padding: 3px 12px; border-radius: 30px; font-size: 0.8rem; margin: 3px; }
        .structure-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        @media (max-width: 600px) { .structure-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="theme-toggle" id="themeToggle">
        <i class="fas fa-sun"></i>
        <i class="fas fa-moon" style="display: none;"></i>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="https://c.top4top.io/p_3819ed0vz1.jpg" alt="Logo" class="logo-img">
                <span>Foxxy</span>
            </div>
            <div class="nav-menu" id="navMenu">
                <a href="../index.html" class="nav-link">Beranda</a>
                <a href="store.html" class="nav-link">Store</a>
                <a href="bot-sewa.html" class="nav-link">Sewa Bot</a>
                <a href="tools.html" class="nav-link active">Tools</a>
                <a href="komunitas.html" class="nav-link">Komunitas</a>
                <a href="../admin/developer.html" class="nav-link">Developer</a>
            </div>
            <div class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <div class="tools-container">
        <h1><i class="fas fa-pen-fancy"></i> Web Request</h1>
        <p class="subtitle">Request fitur website dengan tema mirip link yang dikirim</p>

        <div class="input-group">
            <input type="text" id="webUrl" placeholder="Masukkan URL website referensi... (contoh: https://example.com)">
        </div>
        <div class="input-group">
            <textarea id="requestDesc" placeholder="Deskripsikan fitur yang ingin ditambahkan... (contoh: tambahkan fitur login, dark mode, contact form)"></textarea>
        </div>
        <div class="input-group" style="justify-content: center;">
            <button id="requestBtn"><i class="fas fa-paper-plane"></i> Kirim Request</button>
        </div>

        <div class="result-box" id="resultBox">
            <div id="resultContent"></div>
        </div>

        <a href="tools.html" class="btn-back"><i class="fas fa-arrow-left"></i> Kembali ke Tools</a>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2026 <span class="watermark">Foxxy</span>. All right reserved.</p>
                <p>Developed By <span class="watermark">FoxxyOffc / FoxxyPrst</span></p>
            </div>
        </div>
    </footer>

    <script src="../js/config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initNavToggle();
            
            const btn = document.getElementById('requestBtn');
            const urlInput = document.getElementById('webUrl');
            const descInput = document.getElementById('requestDesc');
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');
            
            btn.addEventListener('click', () => {
                const url = urlInput.value.trim();
                const desc = descInput.value.trim();
                
                if (!url) {
                    alert('Masukkan URL website referensi terlebih dahulu!');
                    return;
                }
                if (!desc) {
                    alert('Masukkan deskripsi fitur yang diminta!');
                    return;
                }
                
                resultBox.classList.add('show');
                
                // Ekstrak fitur dari deskripsi
                const features = desc.split(/[,.]/).filter(f => f.trim().length > 0).map(f => f.trim());
                
                // Simulasi hasil
                const domain = url.match(/https?:\/\/([^\/]+)/)?.[1] || url;
                
                resultContent.innerHTML = `
                    <div style="margin-bottom: 15px;">
                        <div class="info-row"><span>Website Referensi</span><span><strong>${url}</strong></span></div>
                        <div class="info-row"><span>Domain</span><span><strong>${domain}</strong></span></div>
                        <div class="info-row"><span>Fitur Diminta</span><span><strong>${features.length} fitur</strong></span></div>
                    </div>
                    <div style="margin: 15px 0;">
                        <strong style="color: var(--neon-blue);">📋 Fitur yang Diminta:</strong>
                        <div style="margin-top: 10px;">
                            ${features.map(f => `<span class="feature-tag"><i class="fas fa-check"></i> ${f}</span>`).join(' ')}
                        </div>
                    </div>
                    <div style="background: var(--glass-bg); padding: 15px; border-radius: 12px; margin-top: 15px;">
                        <strong style="color: var(--neon-blue);">📁 Struktur Website yang Dihasilkan:</strong>
                        <div class="file-tree" style="margin-top: 10px; font-family: 'Courier New', monospace; font-size: 0.85rem;">
                            <div class="folder">📁 project-${domain}/</div>
                            <div>&nbsp;&nbsp;&nbsp;&nbsp;<div class="file">📄 index.html</div></div>
                            <div>&nbsp;&nbsp;&nbsp;&nbsp;<div class="file">📄 style.css</div></div>
                            <div>&nbsp;&nbsp;&nbsp;&nbsp;<div class="file">📄 script.js</div></div>
                            <div>&nbsp;&nbsp;&nbsp;&nbsp;<div class="folder">📁 assets/</div></div>
                            <div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<div class="file">🖼️ images/</div></div>
                            <div>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<div class="file">📁 fonts/</div></div>
                        </div>
                    </div>
                    <div style="text-align: center; margin-top: 20px;">
                        <button onclick="downloadRequestZip()" class="download-link"><i class="fas fa-download"></i> Download Hasil (ZIP)</button>
                    </div>
                    <div style="margin-top: 15px; text-align: center; color: var(--text-secondary); font-size: 0.85rem;">
                        <i class="fas fa-info-circle"></i> ZIP berisi website dengan tema mirip referensi + fitur yang diminta
                    </div>
                `;
            });
        });
        
        function downloadRequestZip() {
            alert('✅ Download ZIP akan dimulai!\n\nWebsite dengan tema referensi + fitur yang diminta sudah siap.');
        }
    </script>
</body>
</html>
